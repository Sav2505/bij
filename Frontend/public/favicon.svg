<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D2B4E"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#93C5FD" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="100" height="4.5" rx="22 22 0 0" fill="#3B82F6" opacity="0.95"/>

  <!-- ── Headboard ── -->
  <rect x="14" y="18" width="72" height="18" rx="5" fill="url(#accent)" opacity="0.30"/>
  <rect x="14" y="18" width="72" height="18" rx="5" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>

  <!-- ── Bed frame / base ── -->
  <rect x="11" y="62" width="78" height="12" rx="4" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.55)" stroke-width="1.8"/>

  <!-- ── Mattress ── -->
  <rect x="14" y="38" width="72" height="25" rx="4" fill="rgba(255,255,255,0.32)" stroke="rgba(255,255,255,0.70)" stroke-width="1.8"/>

  <!-- ── Left pillow ── -->
  <rect x="18" y="41" width="26" height="13" rx="3.5" fill="white" opacity="0.88"/>
  <!-- pillow detail -->
  <rect x="29" y="46" width="3" height="4" rx="1.5" fill="#3B82F6" opacity="0.55"/>

  <!-- ── Right pillow ── -->
  <rect x="56" y="41" width="26" height="13" rx="3.5" fill="white" opacity="0.88"/>
  <!-- pillow detail -->
  <rect x="67" y="46" width="3" height="4" rx="1.5" fill="#3B82F6" opacity="0.55"/>

  <!-- ── Left leg ── -->
  <rect x="16" y="73" width="9" height="10" rx="2.5" fill="rgba(255,255,255,0.42)"/>
  <!-- ── Right leg ── -->
  <rect x="75" y="73" width="9" height="10" rx="2.5" fill="rgba(255,255,255,0.42)"/>
</svg>
