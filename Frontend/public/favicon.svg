<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background gradient: dark navy to slightly lighter navy -->
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1F38"/>
      <stop offset="100%" stop-color="#163D6E"/>
    </linearGradient>
    <!-- Letter fill: white fading to sky-blue -->
    <linearGradient id="letter" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Bright-blue accent bar across the top -->
  <rect x="0" y="0" width="100" height="5" rx="0" fill="#3B82F6" opacity="0.9"/>
  <rect x="0" y="0" width="100" height="5" rx="20 20 0 0" fill="#3B82F6" opacity="0.9"/>

  <!-- ── B LETTER ──────────────────────────────────────────────────────────────
       Outer contour traces the silhouette of a bold "B".
       Two inner subpaths (fill-rule=evenodd) punch out the two bowls,
       leaving white: the vertical stem, the mid-bar, and the outer rims.
  ────────────────────────────────────────────────────────────────────────── -->
  <path fill-rule="evenodd" fill="url(#letter)" d="
    M 15,11
    L 57,11
    C 79,11 88,20 88,33
    C 88,46 77,51 63,52
    C 80,53 92,61 92,73
    C 92,87 81,92 57,92
    L 15,92
    Z

    M 34,22
    L 55,22
    C 69,22 75,26 75,33
    C 75,40 69,44 55,44
    L 34,44
    Z

    M 34,57
    L 56,57
    C 72,57 78,61 78,71
    C 78,81 72,84 56,84
    L 34,84
    Z
  "/>
</svg>
